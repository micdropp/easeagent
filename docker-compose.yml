version: "3.8"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped

  core:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - EASEAGENT_MQTT__BROKER=mosquitto
      - EASEAGENT_REDIS__HOST=redis
      - EASEAGENT_REDIS__PORT=6379
      - EASEAGENT_CHROMADB__HOST=chromadb
      - EASEAGENT_CHROMADB__PORT=8000
    depends_on:
      - mosquitto
      - redis
      - chromadb
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - core
    restart: unless-stopped

volumes:
  mosquitto_data:
  redis_data:
  chroma_data:
