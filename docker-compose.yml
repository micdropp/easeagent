services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:1.4.1
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data
    restart: unless-stopped

  core:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - MQTT_BROKER=mosquitto
      - REDIS_HOST=redis
    depends_on:
      - mosquitto
      - redis
      - chromadb
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  redis_data:
  chroma_data:
