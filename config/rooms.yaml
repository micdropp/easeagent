rooms:
  - id: entrance
    name: 大门入口
    cameras:
      - cam_entrance
    devices:
      screens:
        - screen_entrance

  - id: zone_a
    name: A区办公区
    cameras:
      - cam_zone_a
    devices:
      lights:
        - light_a1
        - light_a2
        - light_a3
      acs:
        - ac_a1
      screens:
        - screen_a1
      fresh_air:
        - fa_a1
      curtains:
        - curtain_a1
        - curtain_a2
    reflex_rules:
      no_person_delay: 300
      co2_high_threshold: 1000

  - id: meeting_1
    name: 1号会议室
    cameras:
      - cam_meeting_1
    devices:
      lights:
        - light_m1
      acs:
        - ac_m1
      screens:
        - screen_m1
      fresh_air:
        - fa_m1
    reflex_rules:
      no_person_delay: 600
      co2_high_threshold: 1000

  - id: corridor
    name: 走廊公共区
    devices:
      lights:
        - light_cor1
        - light_cor2
    reflex_rules:
      no_person_delay: 120

  - id: toilet_3f_m
    name: 3楼男卫生间
    devices:
      lights:
        - light_toilet_3fm
      toilet_sensors:
        - 3F_M_01
        - 3F_M_02
        - 3F_M_03
    reflex_rules:
      no_person_delay: 60

  - id: toilet_3f_f
    name: 3楼女卫生间
    devices:
      lights:
        - light_toilet_3ff
      toilet_sensors:
        - 3F_F_01
        - 3F_F_02
        - 3F_F_03
    reflex_rules:
      no_person_delay: 60

cameras:
  - id: cam_entrance
    rtsp_url: webcam://0
    room: entrance
    purpose:
      - face_recognition
      - person_detection

